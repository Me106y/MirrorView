name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Keep CI stable and fast: install only deps needed by current CI checks.
      - name: Install minimal test dependencies
        run: python -m pip install requests

      - name: Syntax check (compileall)
        run: python -m compileall server client tts_integration utils

      # Runs unit tests that do not require BOSON_API_KEY / audio hardware.
      - name: Run unit tests
        run: python -m unittest tts_integration.tests.test_tts_service -v
